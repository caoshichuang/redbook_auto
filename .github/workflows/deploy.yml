name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 SSH 私钥
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH key 配置完成"

      # 3. rsync 推送代码（跳过敏感文件）
      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='admin/node_modules' \
            --exclude='admin/dist' \
            --exclude='.env' \
            --exclude='data/holidays.json' \
            --exclude='data/db.sqlite3' \
            --exclude='data/images' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/admin/FinanceSai/
          echo "代码同步完成"

      # 4. 构建前端（原生 ssh，无 drone-ssh 中间层）
      - name: Build frontend
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /home/admin/FinanceSai/admin && npm install --registry=https://registry.npmmirror.com && npm run build && echo '前端构建完成'"

      # 5. 重启服务（原生 ssh）
      - name: Restart service
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'REMOTE_SCRIPT'
          export PATH=$PATH:/home/admin/.local/bin
          # 杀掉旧 uvicorn 进程
          OLD_PID=$(pgrep -f "uvicorn src.main:app" 2>/dev/null || true)
          if [ -n "$OLD_PID" ]; then
            kill $OLD_PID 2>/dev/null || true
            sleep 3
            echo "已停止旧进程 PID=$OLD_PID"
          else
            echo "无旧进程在运行"
          fi
          # 用 nohup + setsid 启动，完全脱离 session
          cd /home/admin/FinanceSai
          nohup setsid python3 -m uvicorn src.main:app --host 0.0.0.0 --port 8080 >> /tmp/finacesail.log 2>&1 &
          NEW_PID=$!
          disown $NEW_PID
          echo "新进程已启动，PID=$NEW_PID"
          REMOTE_SCRIPT

      # 6. 验证服务健康
      - name: Verify service health
        run: |
          echo "等待服务启动（20秒）..."
          sleep 20
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ps aux | grep 'uvicorn' | grep -v grep && curl -sf http://localhost:8080/api/health && echo '✅ 健康检查通过' || (echo '⚠️ 服务异常，查看日志:' && tail -20 /tmp/finacesail.log)"
