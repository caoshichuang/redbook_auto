name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 在 Actions runner（GitHub 机房）检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 SSH 私钥，用于后续 rsync 和 ssh 命令
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # 3. rsync 推送代码到服务器（跳过敏感文件、git历史、node_modules）
      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='admin/node_modules' \
            --exclude='admin/dist' \
            --exclude='.env' \
            --exclude='data/holidays.json' \
            --exclude='data/db.sqlite3' \
            --exclude='data/images' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/admin/FinanceSai/

      # 4. SSH 到服务器：安装依赖、构建前端、重启服务
      - name: Build and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e
            PROJECT_DIR="/home/admin/FinanceSai"
            cd $PROJECT_DIR

            echo "========================================="
            echo "FinanceSail 部署开始（代码已由 rsync 推送）"
            echo "========================================="

            # 构建前端（使用国内镜像）
            echo "[1/2] 构建前端..."
            cd $PROJECT_DIR/admin
            npm install --registry=https://registry.npmmirror.com
            npm run build
            cd $PROJECT_DIR

            # 重启 Python 服务
            echo "[2/2] 重启服务..."
            pkill -f "src.main" 2>/dev/null || true
            sleep 2
            export PATH=$PATH:/home/admin/.local/bin
            # 用 setsid 让新进程成为独立进程组，避免 ssh 会话退出时发 SIGTERM
            setsid nohup python3 -m uvicorn src.main:app --host 0.0.0.0 --port 8080 > /tmp/finacesail.log 2>&1 </dev/null &
            disown

            echo "等待服务启动..."
            sleep 15
            echo "========================================="
            echo "FinanceSail 部署完成"
            echo "========================================="
            ps aux | grep "src.main" | grep -v grep || echo "警告：服务未运行"
            curl -s http://localhost:8080/api/health || echo "警告：服务未响应（可能仍在启动中）"
